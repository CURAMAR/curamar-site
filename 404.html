<style>

    --ink:#e8edf2;--ink-dim:#8a97a5;
    --accent:#c8f542;--accent-cool:#5cc8ff;
    --font-disp:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
    --font-body:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    --font-mono:"SFMono-Regular",Consolas,"Courier New",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.9;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  a{color:var(--accent-cool)}
  .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;

    background-size:48px 48px;
    mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 20%,transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 20%,transparent 70%)}
  .wrap{max-width:640px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
  header{position:sticky;top:0;background:rgba(13,16,20,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--bg-line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:62px}
  .logo{font-family:var(--font-mono);font-weight:700;letter-spacing:.05em;font-size:18px;text-decoration:none}
  .logo .cura{color:var(--accent)}.logo .mar{color:var(--accent-cool)}
  main{flex:1;display:flex;align-items:center}
  .code{font-family:var(--font-mono);font-size:clamp(56px,14vw,96px);font-weight:700;color:var(--accent);line-height:1;margin-bottom:10px}
  h1{font-family:var(--font-disp);font-size:clamp(20px,4vw,28px);font-weight:700;margin-bottom:14px}
  p{color:var(--ink-dim);margin-bottom:26px}
  .links{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:34px}
  .links a{display:block;background:var(--bg-soft);border:1px solid var(--bg-line);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--ink);text-decoration:none;transition:border-color .2s}
  .links a:hover{border-color:var(--accent)}
  .links a span{display:block;font-size:11.5px;color:var(--ink-dim);margin-top:2px}
  @media(max-width:480px){.links{grid-template-columns:1fr}}
</style>
</head>
