<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 350" width="780" height="350" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif" role="img" aria-labelledby="fmsTitle fmsDesc">
<title id="fmsTitle">音声認識字幕の相関図</title>
<desc id="fmsDesc">マイクだけあれば、自分の声をリアルタイムで字幕にできる（コメント接続は不要）。付随機能として表示位置・最大行数・縁取り、フォント5種と色、表示時間や日本語行のオンオフがあり、翻訳と組み合わせると英訳の2段表示・翻訳字幕だけ別の場所への配置・DeepLキーでの高品質化まで広がる。</desc>
<defs>
<marker id="ahs" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4a5a68"/></marker>
</defs>
<rect x="0" y="0" width="780" height="350" rx="14" fill="#0d1014"/>
<rect x="0.5" y="0.5" width="779" height="349" rx="14" fill="none" stroke="#1f2730"/>

<rect x="20" y="16" width="104" height="20" rx="5" fill="#151d16" stroke="#c8f542" stroke-opacity="0.5"/>
<text x="32" y="30" fill="#c8f542" font-size="11.5" font-weight="700">必要なもの</text>

<rect x="20" y="72" width="220" height="46" rx="9" fill="#151d16" stroke="#c8f542" stroke-opacity="0.55"/>
<text x="34" y="92" fill="#e8edf2" font-size="12.5" font-weight="700">マイクだけでOK</text>
<text x="34" y="109" fill="#8a97a5" font-size="10.5">コメントの接続は無くても動く</text>

<g stroke="#38444f" fill="none" marker-end="url(#ahs)" stroke-width="1.4">
<path d="M240,95 L288,96"/>
<path d="M480,97 C505,97 505,61 528,61"/>
<path d="M480,97 L528,97"/>
<path d="M480,97 C505,97 505,133 528,133"/>
</g>
<path d="M385,130 L385,192" stroke="#38444f" fill="none" marker-end="url(#ahs)" stroke-width="1.4" stroke-dasharray="3 3"/>

<rect x="290" y="64" width="190" height="64" rx="10" fill="#101a20" stroke="#5cc8ff" stroke-opacity="0.6"/>
<text x="308" y="92" fill="#e8edf2" font-size="13.5" font-weight="700">自分の声を字幕にする</text>
<text x="308" y="111" fill="#5cc8ff" font-size="10.5">このページの機能</text>

<rect x="528" y="16" width="126" height="20" rx="5" fill="#101a20" stroke="#5cc8ff" stroke-opacity="0.4"/>
<text x="540" y="30" fill="#5cc8ff" font-size="11.5" font-weight="700">付随する機能</text>

<g font-size="11.5" fill="#b9c6d1">
<rect x="528" y="46" width="232" height="30" rx="7" fill="#101a20" stroke="#26343d"/><text x="542" y="65">表示位置・最大行数・縁取り</text>
<rect x="528" y="82" width="232" height="30" rx="7" fill="#101a20" stroke="#26343d"/><text x="542" y="101">フォント5種・色</text>
<rect x="528" y="118" width="232" height="30" rx="7" fill="#101a20" stroke="#26343d"/><text x="542" y="137">表示時間・日本語行のON/OFF</text>
</g>

<rect x="20" y="196" width="740" height="134" rx="12" fill="#16121c" stroke="#b78cff" stroke-opacity="0.38"/>
<rect x="36" y="210" width="216" height="20" rx="5" fill="#1d1726" stroke="#b78cff" stroke-opacity="0.5"/>
<text x="48" y="224" fill="#b78cff" font-size="11.5" font-weight="700">翻訳と組み合わせて広がる</text>
<text x="266" y="224" fill="#8a97a5" font-size="10.5">使わなければ字幕だけのまま＝それでOK</text>

<g font-size="12" fill="#e8edf2">
<rect x="36" y="242" width="232" height="56" rx="8" fill="#120f18" stroke="#332a42"/>
<text x="50" y="264" font-weight="700">英訳を2段で表示</text>
<text x="50" y="283" fill="#8a97a5" font-size="10">日本語字幕の下に英語を自動で</text>
<rect x="278" y="242" width="232" height="56" rx="8" fill="#120f18" stroke="#332a42"/>
<text x="292" y="264" font-weight="700">翻訳字幕だけ別の場所へ</text>
<text x="292" y="283" fill="#8a97a5" font-size="10">ゲーム画面やワイプを避けて配置</text>
<rect x="520" y="242" width="232" height="56" rx="8" fill="#120f18" stroke="#332a42"/>
<text x="534" y="264" font-weight="700">DeepLキーで高品質に</text>
<text x="534" y="283" fill="#8a97a5" font-size="10">無料エンジン標準・キーがあれば切替</text>
</g>
</svg>
