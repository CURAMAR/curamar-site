<head>

<meta name="description" content="curamar.space と配信支援ツール Ligastmir の更新履歴。ツールの新機能・修正、サイトの更新、配信や小説（カクヨム）の動きをまとめています。">
<link rel="canonical" href="https://curamar.space/changelog.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="curamar.space">
<meta property="og:title" content="更新履歴 — curamar / Ligastmir">
<meta property="og:description" content="ツール・サイト・配信・小説の更新をまとめた履歴ページ。">
<meta property="og:url" content="https://curamar.space/changelog.html">
<meta property="og:image" content="https://curamar.space/assets/og-image.png">

<meta name="twitter:image" content="https://curamar.space/assets/og-image.png">
<link rel="icon" href="/favicon.ico">
<style>
  :root{
    --bg:#0d1014;--bg-soft:#141a21;--bg-line:#1f2730;
    --ink:#e8edf2;--ink-dim:#8a97a5;
    --accent:#c8f542;--accent-cool:#5cc8ff;
    --c-site:#5cc8ff;--c-tool:#c8f542;--c-stream:#c792ea;--c-novel:#ff9d6e;
    --radius:14px;--maxw:840px;
    --font-disp:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
    --font-body:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    --font-mono:"SFMono-Regular",Consolas,"Courier New",monospace;
  }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.85;-webkit-font-smoothing:antialiased}
  a{color:var(--accent-cool)}
  .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
    background-image:linear-gradient(var(--bg-line) 1px,transparent 1px),linear-gradient(90deg,var(--bg-line) 1px,transparent 1px);
    background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 20%,transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 20%,transparent 70%)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:50;background:rgba(13,16,20,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--bg-line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:62px;gap:16px}
  .logo{font-family:var(--font-mono);font-weight:700;letter-spacing:.05em;font-size:18px}
  .logo .cura{color:var(--accent)}.logo .mar{color:var(--accent-cool)}
  .nav-links{display:flex;gap:18px;font-size:14px;flex-wrap:wrap}
  .nav-links a{color:var(--ink-dim)}.nav-links a:hover{color:var(--ink)}

  article{padding:48px 0 40px}
  .doc-eyebrow{font-family:var(--font-mono);font-size:13px;color:var(--accent);letter-spacing:.16em;display:inline-flex;align-items:center;gap:10px;margin-bottom:16px}
  .doc-eyebrow::before{content:"";width:28px;height:1px;background:var(--accent)}
  h1{font-family:var(--font-disp);font-size:clamp(26px,5vw,38px);font-weight:700;margin-bottom:10px}
  .sub{color:var(--ink-dim);margin-bottom:22px;font-size:15px}
  .novel-note{border-left:3px solid var(--c-novel);background:var(--bg-soft);padding:12px 16px;border-radius:0 10px 10px 0;font-size:14px;color:var(--ink-dim);margin-bottom:26px}
  .novel-note b{color:var(--ink)}

  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
  .fbtn{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-dim);background:var(--bg-soft);border:1px solid var(--bg-line);border-radius:999px;padding:6px 14px;cursor:pointer;transition:border-color .2s,color .2s}
  .fbtn:hover{color:var(--ink)}
  .fbtn.on{color:var(--ink);border-color:var(--accent-cool)}

  .log{display:flex;flex-direction:column;gap:12px}
  .item{display:grid;grid-template-columns:96px 1fr;gap:16px;background:var(--bg-soft);border:1px solid var(--bg-line);border-radius:12px;padding:16px 18px}
  .item .date{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-dim);white-space:nowrap}
  .item .body .tags{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:7px}
  .tag{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;border-radius:999px;padding:2px 10px;border:1px solid}
  .ver{font-family:var(--font-mono);font-size:11px;color:var(--accent);border:1px solid rgba(200,245,66,.4);border-radius:999px;padding:2px 9px}
  .item .body p{font-size:14px;color:var(--ink);margin:0}
  .empty{color:var(--ink-dim);font-size:14px;padding:20px 0}

  footer{border-top:1px solid var(--bg-line);padding:34px 0;margin-top:44px}
  .foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  .foot .links{display:flex;gap:18px;font-size:14px;flex-wrap:wrap}
  .foot .links a{color:var(--ink-dim)}.foot .links a:hover{color:var(--accent)}
  .foot .cp{font-family:var(--font-mono);font-size:12px;color:var(--ink-dim)}
  @media(max-width:560px){.item{grid-template-columns:1fr;gap:8px}}
</style>
</head>
<body>
<div class="grid-bg"></div>

<header>
  <div class="wrap nav">
    <a href="index.html" class="logo"><span class="cura">cura</span><span class="mar">mar</span></a>
    <nav class="nav-links">
      <a href="index.html">トップ</a>
      <a href="ligastmir.html">Ligastmir</a>
      <a href="guide.html">使い方</a>
      <a href="download.html">ダウンロード</a>
      <a href="blog.html">ブログ</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <article>
    <span class="doc-eyebrow">CHANGELOG</span>
    <h1>更新履歴</h1>
    <p class="sub">ツール（Ligastmir）の新機能・修正、サイトの更新、配信・小説の動きをまとめています。</p>
    <div class="novel-note" id="novel-note" style="display:none"></div>

    <div class="filters" id="filters">
      <button class="fbtn on" data-cat="all">すべて</button>
      <button class="fbtn" data-cat="site">全体</button>
      <button class="fbtn" data-cat="tool">ツール</button>
      <button class="fbtn" data-cat="stream">配信</button>
      <button class="fbtn" data-cat="novel">小説</button>
    </div>

    <div class="log" id="log"><p class="empty">読み込み中…</p></div>
  </article>
</div>

<footer>
  <div class="wrap foot">
    <a href="index.html" class="logo"><span class="cura">cura</span><span class="mar">mar</span></a>
    <nav class="links">
      <a href="index.html">トップ</a>
      <a href="ligastmir.html">Ligastmir</a>
      <a href="download.html">ダウンロード</a>
      <a href="blog.html">ブログ</a>
      
      <a href="support.html">応援</a>
      <a href="credits.html">クレジット</a>
      <a href="privacy.html">プライバシーポリシー</a>
    </nav>
    <div class="cp">© 2026 curamar</div>
  </div>
</footer>

<script>
  var CATS={
    site:{label:'全体',color:'var(--c-site)'},
    tool:{label:'ツール',color:'var(--c-tool)'},
    stream:{label:'配信',color:'var(--c-stream)'},
    novel:{label:'小説',color:'var(--c-novel)'}
  };
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  var ALL=[],CUR='all';
  function render(){
    var log=document.getElementById('log');
    var list=ALL.filter(function(e){return CUR==='all'||e.cat===CUR;});
    if(!list.length){log.innerHTML='<p class="empty">この区分の更新はまだありません。</p>';return;}
    log.innerHTML=list.map(function(e){
      var c=CATS[e.cat]||{label:e.cat,color:'var(--ink-dim)'};
      var tag='<span class="tag" style="color:'+c.color+';border-color:'+c.color+'">'+esc(c.label)+'</span>';
      var ver=e.version?'<span class="ver">'+esc(e.version)+'</span>':'';
      return '<div class="item"><div class="date">'+esc(e.date)+'</div><div class="body"><div class="tags">'+tag+ver+'</div><p>'+esc(e.text)+'</p></div></div>';
    }).join('');
  }
  document.getElementById('filters').addEventListener('click',function(ev){
    var b=ev.target.closest('.fbtn'); if(!b)return;
    CUR=b.getAttribute('data-cat');
    [].forEach.call(this.querySelectorAll('.fbtn'),function(x){x.classList.toggle('on',x===b);});
    render();
  });
  fetch('updates.json').then(function(r){return r.json();}).then(function(d){
    if(d.novel_note){var n=document.getElementById('novel-note');n.innerHTML='<b>小説：</b>'+esc(d.novel_note)+' <a href="https://kakuyomu.jp/users/CURAMAR" target="_blank" rel="noopener">カクヨムで読む ↗</a>';n.style.display='block';}
    ALL=(d.entries||[]).slice().sort(function(a,b){return a.date<b.date?1:(a.date>b.date?-1:0);});
    render();
  }).catch(function(){document.getElementById('log').innerHTML='<p class="empty">更新履歴を読み込めませんでした。</p>';});
</script>
<script src="/sitemap.js" defer></script>
</body>
</html>
