<style>
  :root{
    --bg:#0d1014;--bg-soft:#141a21;--bg-line:#1f2730;
    --ink:#e8edf2;--ink-dim:#8a97a5;
    --accent:#c8f542;--accent-cool:#5cc8ff;--warn:#ff6b6b;
    --radius:14px;--maxw:820px;
    --font-disp:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
    --font-body:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    --font-mono:"SFMono-Regular",Consolas,"Courier New",monospace;
  }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.9;-webkit-font-smoothing:antialiased}
  a{color:var(--accent-cool)}
  .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
    background-image:linear-gradient(var(--bg-line) 1px,transparent 1px),linear-gradient(90deg,var(--bg-line) 1px,transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 20%,transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 20%,transparent 70%)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1}

  header{position:sticky;top:0;z-index:50;background:rgba(13,16,20,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--bg-line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:62px;gap:16px}
  .logo{font-family:var(--font-mono);font-weight:700;letter-spacing:.05em;font-size:18px}
  .logo .cura{color:var(--accent)}.logo .mar{color:var(--accent-cool)}
  .nav-links{display:flex;gap:18px;font-size:14px;flex-wrap:wrap}
  .nav-links a{color:var(--ink-dim)}.nav-links a:hover{color:var(--ink)}
  .nav-links a.cur{color:var(--accent)}

  article{padding:48px 0 40px}
  .doc-eyebrow{font-family:var(--font-mono);font-size:13px;color:var(--accent);letter-spacing:.16em;display:inline-flex;align-items:center;gap:10px;margin-bottom:16px}
  .doc-eyebrow::before{content:"";width:28px;height:1px;background:var(--accent)}
  h1{font-family:var(--font-disp);font-size:clamp(26px,5vw,38px);font-weight:700;margin-bottom:10px}
  .sub{color:var(--ink-dim);margin-bottom:30px}

  /* クレジット本体（カテゴリ駆動・アイコン枠は本人色を尊重して中立） */
  .cred-cat{margin-bottom:30px}
  .cred-h{font-family:var(--font-disp);font-size:18px;font-weight:700;color:var(--accent);
    border-bottom:1px solid var(--bg-line);padding-bottom:8px;margin-bottom:14px}
  /* align-items:flex-start が無いと、ピル（タグ無しの人）が同じ行の紹介つきカードの
     高さまで縦に引き伸ばされて大きな楕円になる。行内で高さを揃えない。 */
  .cred-grid{display:flex;flex-wrap:wrap;align-items:flex-start;gap:12px}
  .cred-card{display:inline-flex;align-items:center;gap:10px;background:var(--bg-soft);
    border:1px solid var(--bg-line);border-radius:999px;padding:8px 18px 8px 8px;
    color:var(--ink);transition:border-color .2s,transform .2s;
    text-decoration:none}
  /* カード全体がリンクなので、下線が付くと紹介文まで下線だらけで読みにくい。
     リンクだと分かる手掛かりは枠のハイライトと、ホバー時の名前の下線に持たせる。 */
  .cred-card:hover .cred-name{text-decoration:underline;text-underline-offset:3px}
  .cred-card.no-ava{padding:10px 18px}
  .cred-card:hover{border-color:var(--accent-cool);transform:translateY(-1px)}
  /* アイコンは本人のものをそのまま（Ligastmirカラーに染めない＝filterや色付けをしない） */
  .cred-ava{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--bg-line);flex:none}
  .cred-name{font-size:14.5px;font-weight:600;color:var(--ink)}
  .cred-empty{color:var(--ink-dim);font-size:14px}
  /* 拡張カード（tags/comment がある協力者＝紹介つき）。無い人は従来のピルのまま */
  /* 紹介つきカード。イラストをもらった人は全身が見えるよう大きめに（横型） */
  /* 紹介つきカードは全員同じ幅・同じ最低高さに揃える。回答は人によって長さが
     まちまち（タグ0〜7個・紹介文の長短・アイコンの有無）なので、幅を固定して
     縦に伸びる方向へ逃がすと、並べたときの見た目が破綻しない。 */
  .cred-card.rich{align-items:flex-start;border-radius:14px;padding:14px 16px;gap:14px;
    flex:0 1 420px;max-width:420px;min-height:132px}
  .cred-card.rich .cred-body{display:flex;flex-direction:column;gap:8px;min-width:0;flex:1}
  /* 長い表示名・URL・英数字の連続でカードから文字がはみ出さないようにする */
  .cred-card.rich .cred-name,.cred-note,.cred-tag,.cred-link{overflow-wrap:anywhere}
  .cred-portrait{width:104px;height:104px;flex:none;border-radius:12px;object-fit:contain;
    background:linear-gradient(160deg,#182430,#0f141a);border:1px solid var(--bg-line);padding:4px}
  @media(max-width:520px){.cred-card.rich{max-width:100%}.cred-portrait{width:84px;height:84px}}
  .cred-tags{display:flex;flex-wrap:wrap;gap:5px}
  /* 想定外に長いタグ（ゲーム名など）が来ても、折り返さず「…」で丸めて枠を守る */
  .cred-tag{font-size:10.5px;color:var(--accent-cool);border:1px solid rgba(92,200,255,.35);border-radius:999px;padding:1px 9px;
    white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .cred-note{font-size:12px;color:var(--ink-dim);line-height:1.7}
  /* 追加リンク（同時配信など、掲載先が複数ある人の2本目以降） */
  .cred-links{display:flex;flex-wrap:wrap;gap:6px}
  .cred-link{font-size:11px;color:var(--ink-dim);border:1px solid var(--bg-line);
    border-radius:999px;padding:2px 10px;text-decoration:none;
    white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .cred-link:hover{color:var(--ink);border-color:var(--accent-cool)}
  .cred-card.rich .cred-name{text-decoration:none;color:var(--ink);align-self:flex-start}
  .cred-card.rich .cred-name:hover{text-decoration:underline;text-underline-offset:3px}

  footer{border-top:1px solid var(--bg-line);padding:34px 0;margin-top:44px}
  .foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  .foot .links{display:flex;gap:18px;font-size:14px;flex-wrap:wrap}
  .foot .links a{color:var(--ink-dim)}.foot .links a:hover{color:var(--accent)}
  .foot .cp{font-family:var(--font-mono);font-size:12px;color:var(--ink-dim)}
</style>

<script>
  // クレジットは contributors.json（データ）と本ページ（表示）を分離。
  // 人・カテゴリの増減は JSON 編集だけで済む（HTMLは触らない）。
  // カテゴリ表示名・順序はここで定義（新カテゴリは1行足すだけ）。
  var CATEGORY_LABELS = { tool: 'ツール開発協力', creator: 'クリエイター枠' };
  var CATEGORY_ORDER  = ['tool', 'creator'];

  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m];
    });
  }

  function render(list){
    var root = document.getElementById('credits-root');
    if (!Array.isArray(list)) list = [];
    // カテゴリごとにグループ化
    var groups = {};
    list.forEach(function(c){
      if (!c || !c.name) return;
      var cat = c.category || 'other';
      (groups[cat] = groups[cat] || []).push(c);
    });
    // 定義順 → 未定義カテゴリの順
    var cats = CATEGORY_ORDER.filter(function(c){ return groups[c]; });
    Object.keys(groups).forEach(function(c){ if (cats.indexOf(c) < 0) cats.push(c); });
    if (cats.length === 0){ root.innerHTML = '<p class="cred-empty">協力者は準備中です。</p>'; return; }

    var html = '';
    cats.forEach(function(cat){
      var label = CATEGORY_LABELS[cat] || cat;
      html += '<section class="cred-cat"><h2 class="cred-h">' + esc(label) + '</h2><div class="cred-grid">';
      groups[cat].forEach(function(c){
        var url  = c.url ? esc(c.url) : '#';
        var name = esc(c.name);
        // アイコンのフォールバック: icon が空なら名前だけ（崩れない）。本人アイコンは色を染めない。
        var hasIcon = !!(c.icon && String(c.icon).trim());
        var ava = hasIcon ? '<img class="cred-ava" src="' + esc(c.icon) + '" alt="' + name + '" loading="lazy">' : '';
        // 拡張スキーマ（すべて任意・後方互換）: tags=配列（本人確認済みのみ・表示は最大7）／comment=一言紹介。
        // どちらかがあればリッチカード、無ければ従来のピル表示。
        var tags = Array.isArray(c.tags) ? c.tags.slice(0, 7) : [];
        var note = (c.comment && String(c.comment).trim()) ? String(c.comment).trim() : '';
        // links=[{label,url}]（任意）: 同時配信などで掲載先が複数ある人の2本目以降。
        // リンクを入れ子にできないので、links があるカードは <a> ではなく <div> で組む。
        var links = Array.isArray(c.links)
          ? c.links.filter(function(l){ return l && l.url && l.label; }).slice(0, 3)
          : [];
        if (tags.length || note || links.length) {
          var tagHtml = tags.length
            ? '<span class="cred-tags">' + tags.map(function(t){ return '<span class="cred-tag">' + esc(t) + '</span>'; }).join('') + '</span>'
            : '';
          var noteHtml = note ? '<span class="cred-note">' + esc(note) + '</span>' : '';
          // 紹介つきは横型: 左に全身ポートレート（もらった絵をそのまま見せる）／右に名前・タグ・紹介
          var portrait = hasIcon
            ? '<img class="cred-portrait" src="' + esc(c.icon) + '" alt="' + name + '" loading="lazy">'
            : '';
          var linkHtml = links.length
            ? '<span class="cred-links">' + links.map(function(l){
                return '<a class="cred-link" href="' + esc(l.url) + '" target="_blank" rel="noopener">' +
                       esc(l.label) + '</a>';
              }).join('') + '</span>'
            : '';
          var portraitHtml = portrait
            ? '<a href="' + url + '" target="_blank" rel="noopener">' + portrait + '</a>'
            : '';
          html += '<div class="cred-card rich' + (hasIcon ? '' : ' no-ava') + '">' +
                  portraitHtml +
                  '<span class="cred-body">' +
                  '<a class="cred-name" href="' + url + '" target="_blank" rel="noopener">' + name + '</a>' +
                  tagHtml + noteHtml + linkHtml + '</span></div>';
        } else {
          html += '<a class="cred-card' + (hasIcon ? '' : ' no-ava') + '" href="' + url + '" target="_blank" rel="noopener">' +
                  ava + '<span class="cred-name">' + name + '</span></a>';
        }
      });
      html += '</div></section>';
    });
    root.innerHTML = html;
  }

  fetch('contributors.json', { cache: 'no-cache' })
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function(e){
      document.getElementById('credits-root').innerHTML =
        '<p class="cred-empty">クレジットの読み込みに失敗しました。</p>';
    });
</script>
