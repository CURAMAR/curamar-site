    -webkit-mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 20%,transparent 70%)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1}

  header{position:sticky;top:0;z-index:50;background:rgba(13,16,20,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--bg-line)}

  .logo{font-family:var(--font-mono);font-weight:700;letter-spacing:.05em;font-size:18px}
  .logo .cura{color:var(--accent)}.logo .mar{color:var(--accent-cool)}
  .nav-links{display:flex;gap:18px;font-size:14px;flex-wrap:wrap}
  .nav-links a{color:var(--ink-dim)}.nav-links a:hover{color:var(--ink)}
  .nav-links a.cur{color:var(--accent)}

  article{padding:48px 0 40px}
  .doc-eyebrow{font-family:var(--font-mono);font-size:13px;color:var(--accent);letter-spacing:.16em;display:inline-flex;align-items:center;gap:10px;margin-bottom:16px}
  .doc-eyebrow::before{content:"";width:28px;height:1px;background:var(--accent)}
  h1{font-family:var(--font-disp);font-size:clamp(26px,5vw,38px);font-weight:700;margin-bottom:10px}
  .sub{color:var(--ink-dim);margin-bottom:30px}

  /* クレジット本体（カテゴリ駆動・アイコン枠は本人色を尊重して中立） */
  .cred-cat{margin-bottom:30px}
  .cred-h{font-family:var(--font-disp);font-size:18px;font-weight:700;color:var(--accent);
    border-bottom:1px solid var(--bg-line);padding-bottom:8px;margin-bottom:14px}
  .cred-grid{display:flex;flex-wrap:wrap;gap:12px}
  .cred-card{display:inline-flex;align-items:center;gap:10px;background:var(--bg-soft);
    border:1px solid var(--bg-line);border-radius:999px;padding:8px 18px 8px 8px;
    color:var(--ink);transition:border-color .2s,transform .2s}
  .cred-card.no-ava{padding:10px 18px}
  .cred-card:hover{border-color:var(--accent-cool);transform:translateY(-1px)}
  /* アイコンは本人のものをそのまま（Ligastmirカラーに染めない＝filterや色付けをしない） */
  .cred-ava{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--bg-line);flex:none}
  .cred-name{font-size:14.5px;font-weight:600;color:var(--ink)}
  .cred-empty{color:var(--ink-dim);font-size:14px}

  .foot .cp{font-family:var(--font-mono);font-size:12px;color:var(--ink-dim)}

<script>
  // クレジットは contributors.json（データ）と本ページ（表示）を分離。
  // 人・カテゴリの増減は JSON 編集だけで済む（HTMLは触らない）。
  // カテゴリ表示名・順序はここで定義（新カテゴリは1行足すだけ）。
  var CATEGORY_LABELS = { tool: 'ツール開発協力', creator: 'クリエイター枠' };
  var CATEGORY_ORDER  = ['tool', 'creator'];

  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m];
    });
  }

  function render(list){
    var root = document.getElementById('credits-root');
    if (!Array.isArray(list)) list = [];
    // カテゴリごとにグループ化
    var groups = {};
    list.forEach(function(c){
      if (!c || !c.name) return;
      var cat = c.category || 'other';
      (groups[cat] = groups[cat] || []).push(c);
    });
    // 定義順 → 未定義カテゴリの順
    var cats = CATEGORY_ORDER.filter(function(c){ return groups[c]; });
    Object.keys(groups).forEach(function(c){ if (cats.indexOf(c) < 0) cats.push(c); });
    if (cats.length === 0){ root.innerHTML = '<p class="cred-empty">協力者は準備中です。</p>'; return; }

    var html = '';
    cats.forEach(function(cat){
      var label = CATEGORY_LABELS[cat] || cat;
      html += '<section class="cred-cat"><h2 class="cred-h">' + esc(label) + '</h2><div class="cred-grid">';
      groups[cat].forEach(function(c){
        var url  = c.url ? esc(c.url) : '#';
        var name = esc(c.name);
        // アイコンのフォールバック: icon が空なら名前だけ（崩れない）。本人アイコンは色を染めない。
        var hasIcon = !!(c.icon && String(c.icon).trim());
        var ava = hasIcon ? '<img class="cred-ava" src="' + esc(c.icon) + '" alt="' + name + '" loading="lazy">' : '';
        html += '<a class="cred-card' + (hasIcon ? '' : ' no-ava') + '" href="' + url + '" target="_blank" rel="noopener">' +
                ava + '<span class="cred-name">' + name + '</span></a>';
      });
      html += '</div></section>';
    });
    root.innerHTML = html;
  }

  fetch('contributors.json', { cache: 'no-cache' })
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function(e){
      document.getElementById('credits-root').innerHTML =
        '<p class="cred-empty">クレジットの読み込みに失敗しました。</p>';
    });
</script>
