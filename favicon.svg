<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Ligastmir アプリアイコン案D＝三角形(再生/配信)＋右へ電波＋読込ドット。3色ネオン・文字なし。 -->
  <defs>
    <radialGradient id="dNeon" cx="42%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#123a4a"/>
      <stop offset="55%" stop-color="#0e1622"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <linearGradient id="dStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8f542"/>
      <stop offset="50%" stop-color="#eaffff"/>
      <stop offset="100%" stop-color="#42d4f5"/>
    </linearGradient>
    <filter id="dGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#dNeon)"/>
  <g fill="none" stroke="url(#dStroke)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" filter="url(#dGlow)">
    <path d="M96 74 L176 128 L96 182 Z"/>
